<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
      }
    }
    </script>
</head>
<body>
    <canvas id="viewer"></canvas>

    <div id="drop-zone" class="hidden">
        <div class="drop-message">
            <h2>Drop 3D model here</h2>
            <p>(.gltf, .glb, .obj, .stl)</p>
        </div>
    </div>

    <div class="controls-overlay">
        <input type="file" id="file-input" accept=".gltf,.glb,.obj,.stl">
        
        <div id="info-panel">
            <h3>Model Info</h3>
            <div id="model-details">
                <p><strong>File:</strong> <span id="info-name">—</span></p>
                <p><strong>Vertices:</strong> <span id="info-vertices">—</span></p>
                <p><strong>Size:</strong> <span id="info-dimensions">—</span></p>
            </div>
        </div>

        <button id="reset-btn">Reset View</button>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
